<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Produit</title>
</head>
<body>

<h1 th:text="${isEdit} ? 'Modifier' : 'Ajouter'"></h1>

<form th:action="${actionUrl}" method="post">

    <label>Nom :</label>
    <input type="text"
           name="nomProduit"
           th:value="${produit.nomProduit}">

    <br><br>

    <label>Prix :</label>
    <input type="number"
           step="0.01"
           name="prixBase"
           th:value="${produit.prixBase}">

    <br><br>

    <label>Nouveau :</label>
    <input type="checkbox"
           name="estNouveau"
           value="true"
           th:checked="${produit.estNouveau}">

    <br><br>

    <button type="submit">
        Enregistrer
    </button>

</form>

<a href="/produits">Retour</a>

</body>
</html>
