<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire ingrédient</title>
</head>
<body>

<h1 th:text="${isEdit} ? 'Modifier ingrédient' : 'Ajouter ingrédient'"></h1>

<form th:action="@{${actionUrl}}" method="post">

    <!-- ID caché pour UPDATE -->
    <input type="hidden" th:if="${isEdit}" th:value="${ingredient.idIngredient}" name="id"/>

    <div>
        <label>Nom :</label>
        <input type="text"
               name="nomIngredient"
               th:value="${ingredient.nomIngredient}" />
    </div>

    <div>
        <label>Seuil d’alerte :</label>
        <input type="number"
               step="0.01"
               name="seuilAlerteQuantite"
               th:value="${ingredient.seuilAlerteQuantite}" />
    </div>

    <div>
        <label>Unité :</label>
        <input type="text"
               name="uniteMesure"
               th:value="${ingredient.uniteMesure}" />
    </div>

    <button type="submit">
        <span th:text="${isEdit} ? 'Modifier' : 'Créer'"></span>
    </button>

</form>

<br>

<a th:href="@{/ingredients}">Retour à la liste</a>

</body>
</html>
