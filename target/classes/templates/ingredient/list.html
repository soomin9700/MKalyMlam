<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des ingrédients - Administration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/style_form.css}">
    <link rel="stylesheet" th:href="@{/css/style_list.css}">
    <!-- Font Awesome 6 (gratuit) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>ADMIN PANEL</h2>
            <a href="#">Dashboard</a>
            <a href="./produits">Produits</a>
            <a href="#">Commandes</a>
            <a href="#">Employés</a>
            <a href="#">Clients</a>
            <a href="#">Statistiques</a>
            <a href="#" class="active" style="color: var(--secondary);">Ingrédients</a>
        </div>
        <div class="main">

            <div class="table-container">
                <!-- En-tête avec titre et bouton Ajouter -->
                <div class="table-header">
                    <h1><i class="fas fa-utensils" style="color: var(--primary); margin-right: 10px;"></i> Liste des ingrédients</h1>
                    <a th:href="@{/ingredients/new}" class="btn-add">
                         Ajouter un ingrédient
                    </a>
                </div>

                <!-- Tableau des ingrédients -->
                <table>
                    <thead>
                        <tr>
                            <th><i class="fas fa-hashtag"></i> ID</th>
                            <th><i class="fas fa-tag"></i> Nom</th>
                            <th><i class="fas fa-exclamation-triangle"></i> Seuil d'alerte</th>
                            <th><i class="fas fa-ruler"></i> Unité</th>
                            <th><i class="fas fa-cog"></i> Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <!-- Vérification si la liste est vide -->
                        <tr th:if="${ingredients.isEmpty()}">
                            <td colspan="5">
                                <div class="empty-state">
                                    <i class="fas fa-utensils" style="font-size: 48px; color: #d1d5db; margin-bottom: 15px; display: block;"></i>
                                    <p>Aucun ingrédient enregistré pour le moment.</p>
                                    <a th:href="@{/ingredients/new}" class="btn-add">
                                        <i class="fas fa-plus"></i> Ajouter le premier ingrédient
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <!-- Affichage des ingrédients -->
                        <tr th:each="i : ${ingredients}" th:unless="${ingredients.isEmpty()}">
                            <td><span class="badge badge-id" th:text="${i.idIngredient}"></span></td>
                            <td><strong th:text="${i.nomIngredient}"></strong></td>
                            <td>
                                <span th:if="${i.seuilAlerteQuantite != null}" th:text="${i.seuilAlerteQuantite}"></span>
                                <span th:unless="${i.seuilAlerteQuantite != null}" class="text-muted">-</span>
                            </td>
                            <td>
                                <span th:if="${i.uniteMesure != null}" th:text="${i.uniteMesure}"></span>
                                <span th:unless="${i.uniteMesure != null}" class="text-muted">-</span>
                            </td>
                            <td>
                                <div class="actions">
                                    <!-- Bouton Modifier -->
                                    <a th:href="@{'/ingredients/' + ${i.idIngredient} + '/edit'}" 
                                       class="btn-edit">
                                        <i class="fas fa-edit"></i> Modifier
                                    </a>

                                    <!-- Formulaire de suppression -->
                                    <form th:action="@{'/ingredients/' + ${i.idIngredient} + '/delete'}"
                                          method="post"
                                          style="display:inline;"
                                          onsubmit="return confirm('Êtes-vous sûr de vouloir supprimer cet ingrédient ?');">
                                        <button type="submit" class="btn-delete">
                                            <i class="fas fa-trash-alt"></i> Supprimer
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</body>
</html>
