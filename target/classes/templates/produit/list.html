<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des produits - Administration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/style_form.css}">
    <link rel="stylesheet" th:href="@{/css/style_list.css}">
    <link rel="stylesheet" th:href="@{/css/style_list_prod.css}">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard">
        
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>ADMIN PANEL</h2>
            <a href="#">Dashboard</a>
            <a href="#" class="active" style="color: var(--secondary);">Produits</a>
            <a href="#">Commandes</a>
            <a href="#">Employés</a>
            <a href="#">Clients</a>
            <a href="#">Statistiques</a>
            <a href="./ingredients">Ingrédients</a>
        </div>

        <div class="main">

            <div class="table-container">
                <!-- En-tête avec titre et bouton Ajouter -->
                <div class="table-header">
                    <h1><i class="fas fa-box" style="color: var(--primary); margin-right: 10px;"></i> Liste des produits</h1>
                    <a th:href="@{/produits/new}" class="btn-add">
                         Ajouter un produit
                    </a>
                </div>

                <!-- Tableau des produits -->
                <table>
                    <thead>
                        <tr>
                            <th><i class="fas fa-hashtag"></i> ID</th>
                            <th><i class="fas fa-tag"></i> Nom</th>
                            <th><i class="fas fa-euro-sign"></i> Prix</th>
                            <th><i class="fas fa-star"></i> Nouveau</th>
                            <th><i class="fas fa-calendar"></i> Date</th>
                            <th><i class="fas fa-cog"></i> Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <!-- Vérification si la liste est vide -->
                        <tr th:if="${produits.isEmpty()}">
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="fas fa-box" style="font-size: 48px; color: #d1d5db; margin-bottom: 15px; display: block;"></i>
                                    <p>Aucun produit enregistré pour le moment.</p>
                                    <a th:href="@{/produits/new}" class="btn-add">
                                        <i class="fas fa-plus"></i> Ajouter le premier produit
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <!-- Affichage des produits -->
                        <tr th:each="produit : ${produits}" th:unless="${produits.isEmpty()}">
                            <td><span class="product-id" th:text="${produit.idProduit}"></span></td>
                            <td><strong th:text="${produit.nomProduit}"></strong></td>
                            <td><span class="price-tag" th:text="'€ ' + ${produit.prixBase}"></span></td>
                            <td>
                                <span th:if="${produit.estNouveau}" class="badge-new active">
                                    <i class="fas fa-check-circle"></i> Oui
                                </span>
                                <span th:unless="${produit.estNouveau}" class="badge-new inactive">
                                    <i class="fas fa-times-circle"></i> Non
                                </span>
                            </td>
                            <td th:text="${produit.dateCreation}"></td>
                            <td>
                                <div class="table-actions">
                                    <!-- Bouton Modifier -->
                                    <a th:href="@{/produits/{id}/edit(id=${produit.idProduit})}" 
                                       class="btn-edit-product">
                                        <i class="fas fa-edit"></i> Modifier
                                    </a>

                                    <!-- Formulaire de suppression -->
                                    <form th:action="@{/produits/{id}/delete(id=${produit.idProduit})}"
                                          method="post"
                                          style="display:inline;"
                                          onsubmit="return confirm('Êtes-vous sûr de vouloir supprimer ce produit ? Cette action est irréversible.');">
                                        <button type="submit" class="btn-delete-product">
                                            <i class="fas fa-trash-alt"></i> Supprimer
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</body>
</html>
