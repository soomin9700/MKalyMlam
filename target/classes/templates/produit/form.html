<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Modifier un produit' : 'Ajouter un produit'">Produit - Administration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/style_form.css}">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>ADMIN PANEL</h2>
            <a href="#">Dashboard</a>
            <a href="#" class="active" style="color: var(--secondary);">Produits</a>
            <a href="#">Commandes</a>
            <a href="#">Employés</a>
            <a href="#">Clients</a>
            <a href="#">Statistiques</a>
            <a href="./ingredients">Ingrédients</a>
        </div>

        <div class="main">

            <!-- Lien retour -->
            <a th:href="@{/produits}" class="back-link">
                <i class="fas fa-arrow-left"></i> Retour à la liste des produits
            </a>

            <div class="form-section">
                <form th:action="${actionUrl}" method="post">
                    
                    <!-- ID caché pour UPDATE -->
                    <input type="hidden" th:if="${isEdit}" th:value="${produit.idProduit}" name="id"/>

                    <h1>
                        <i class="fas fa-box product-icon"></i>
                        <span th:text="${isEdit} ? 'Modifier le produit' : 'Ajouter un nouveau produit'"></span>
                    </h1>
                    <p style="color: #6b7280; margin-bottom: 30px;" th:text="${isEdit} ? 'Modifiez les informations du produit sélectionné.' : 'Remplissez tous les champs pour enregistrer un produit dans la base de données.'">
                        Remplissez tous les champs pour enregistrer un produit dans la base de données.
                    </p>

                    <hr style="border: none; border-top: 1px solid var(--gray); margin: 20px 0;">
                    <br>

                    <!-- Champ Nom -->
                    <div class="form-group">
                        <label for="nomProduit">
                            Nom du produit <span class="required-star">*</span>
                        </label>
                        <input type="text" 
                               id="nomProduit"
                               name="nomProduit"
                               th:value="${produit.nomProduit}" 
                               placeholder="Ex: Pizza Margherita, Burger Deluxe, etc."
                               required/>
                    </div>

                    <!-- Champ Prix -->
                    <div class="form-group">
                        <label for="prixBase">
                            Prix de base (€) <span class="required-star">*</span>
                        </label>
                        <input type="number" 
                               id="prixBase"
                               step="0.01" 
                               min="0"
                               name="prixBase"
                               th:value="${produit.prixBase}" 
                               placeholder="Ex: 12.99"
                               required/>
                        <small>Prix en euros, avec deux décimales maximum.</small>
                    </div>

                    <!-- Champ Nouveau (checkbox) -->
                    <div class="checkbox-group">
                        <input type="checkbox" 
                               id="estNouveau"
                               name="estNouveau" 
                               value="true"
                               th:checked="${produit.estNouveau}"/>
                        <label for="estNouveau">
                            <i class="fas fa-star" style="color: var(--secondary);"></i>
                            Marquer comme nouveau produit
                            <span class="helper-text">(mis en avant dans la section "Nouveautés")</span>
                        </label>
                    </div>

                    <!-- Boutons d'action -->
                     
                    <div class="form-actions">
                        <button type="submit" class="btn-success">
                            <i class="fas" th:classappend="${isEdit} ? 'fa-save' : 'fa-plus'"></i>
                            <span th:text="${isEdit} ? 'Mettre à jour' : 'Enregistrer le produit'"></span>
                        </button>
                        <button type="reset" class="btn-secondary">
                            <i class="fas fa-undo"></i> Réinitialiser
                        </button>
                        <a th:href="@{/produits}" style="margin-left: auto; align-self: center; color: var(--primary); text-decoration: none;">
                            <i class="fas fa-times"></i> Annuler
                        </a>
                    </div>

                </form>
            </div>

        </div>
    </div>

</body>
</html>
