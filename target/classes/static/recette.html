<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lier un produit a un ingredient</title>
</head>
<body>
<h1>Creer une recette de base</h1>

<form action="/recetteBase/save" method="POST">
  <label>Produit :
    <select name="id_produit" required>
      <option value="">-- Choisir un produit --</option>
      <option value="1">Sandwich poulet</option>
      <option value="2">Burger boeuf</option>
      <option value="3">Hot dog</option>
      <option value="4">Salade cesar</option>
      <option value="5">Pizza fromage</option>
    </select>
  </label>
  <br><br>

  <label>Ingredient :
    <select name="id_ingredient" required>
      <option value="">-- Choisir un ingredient --</option>
      <option value="1">Pain burger</option>
      <option value="2">Blanc de poulet</option>
      <option value="3">Steak boeuf</option>
      <option value="4">Salade verte</option>
      <option value="5">Tomate</option>
      <option value="6">Fromage rape</option>
      <option value="7">Saucisse</option>
      <option value="8">Pate a pizza</option>
      <option value="9">Sauce tomate</option>
    </select>
  </label>
  <br><br>

  <label>Quantite necessaire :
    <input type="number" name="quantite_recette" step="0.001" required>
  </label>
  <br><br>

  <button type="submit">Lier</button>
</form>

<hr>
<h2>Recettes existantes</h2>
<div id="listeRecettes"></div>

<script>
fetch('/recetteBase/findAll')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var html = '<table border="1"><tr><th>ID</th><th>Produit</th><th>Ingredient</th><th>Quantite</th></tr>';
    data.forEach(function(r) {
      html += '<tr><td>' + r.id + '</td><td>' + r.id_produit + '</td><td>' + r.id_ingredient + '</td><td>' + r.quantite_recette + '</td></tr>';
    });
    html += '</table>';
    document.getElementById('listeRecettes').innerHTML = html;
  })
  .catch(function(e) {
    document.getElementById('listeRecettes').innerHTML = 'Erreur de chargement : ' + e.message;
  });
</script>
</body>
</html>
